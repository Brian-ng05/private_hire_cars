<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | Private HireCars</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h1>PRIVATE HIRECARS</h1>
            <p>Admin Control Panel</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="operator@phc.co.uk" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>

            <div class="form-footer">
                <a href="pages/recovery.html">Forgot Password?</a>
                <a href="pages/register.html">Request Account</a>
            </div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>Signing In...';

            setTimeout(() => {
                sessionStorage.setItem('phc_staff_logged_in', 'true');
                window.location.href = 'index.html';
            }, 1000);
        });
    </script>
</body>
</html>
