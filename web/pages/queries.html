<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Queries | Private HireCars Staff</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .query-layout { display: flex; height: calc(100vh - 160px); gap: 20px; margin-top: 10px; }
        .chat-sidebar { width: 320px; background: #fff; border-radius: 12px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .sidebar-search { padding: 15px; border-bottom: 1px solid #eee; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; transition: 0.2s; position: relative; }
        .chat-item:hover { background: #f8f9fa; }
        .chat-item.active { background: #f0f4ff; border-left: 4px solid #000; }
        .chat-item h4 { margin: 0 0 5px 0; font-size: 0.95rem; }
        .chat-item p { margin: 0; font-size: 0.8rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-main { flex: 1; background: #fff; border-radius: 12px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 12px 12px 0 0; }
        .chat-body { flex: 1; padding: 20px; overflow-y: auto; background: #f4f7f6; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .msg-staff { align-self: flex-end; background: #000; color: #fff; border-bottom-right-radius: 2px; }
        .msg-user { align-self: flex-start; background: #fff; color: #333; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .msg-time { font-size: 0.7rem; margin-top: 5px; opacity: 0.6; display: block; text-align: right; }
        .chat-footer { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-footer input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .chat-footer input:focus { border-color: #000; }
        .invoice-card { background: #fff; border-left: 4px solid #28a745; padding: 15px; border-radius: 8px; color: #000; font-family: 'Courier New', Courier, monospace; margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body onload="initChat()">

    <aside class="sidebar">
        <div class="sidebar-header"><h2>PRIVATE HIRECARS</h2></div>
        <nav class="nav-links">
            <a href="../index.html">Dashboard</a>
            <a href="booking.html">New Booking</a>
            <a href="drivers.html">Driver Directory</a>
            <a href="fleet.html">Fleet Management</a>
            <a href="customers.html">Manage Customers</a>
            <a href="offers.html">Coupon Management</a>
            <a href="queries.html" class="active">User Queries</a>
        </nav>
    </aside>

    <main class="main-container">
        <header class="top-bar">
            <h1>Customer Support</h1>
        </header>

        <div class="query-layout">
            <div class="chat-sidebar">
                <div class="sidebar-search">
                    <input type="text" placeholder="Search conversation..." style="width:100%; padding:8px; border-radius:5px; border:1px solid #ddd;">
                </div>
                <div class="chat-list" id="chatListContainer">
                    </div>
            </div>

            <div class="chat-main">
                <div class="chat-header">
                    <div>
                        <h3 id="currentChatUser">Select a conversation</h3>
                        <small id="userStatus" style="color: #28a745;"></small>
                    </div>
                </div>

                <div class="chat-body" id="chatDisplay">
                    <div style="text-align: center; color: #888; margin-top: 50px;">Select a user from the left to start messaging.</div>
                </div>

                <div class="chat-footer">
                    <input type="text" id="messageInput" placeholder="Write a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let conversations = {
            "Nguyen Van A": [
                { sender: "user", text: "Hi, I'd like to check my booking status.", time: "09:00 AM" },
                { sender: "staff", text: "Hello A! Let me check that for you.", time: "09:02 AM" }
            ],
            "Sarah Jenkins": [
                { sender: "user", text: "The driver is a bit late, can you check?", time: "08:30 AM" }
            ]
        };

        let activeUser = "";

        function initChat() {
            const targetUser = localStorage.getItem('activeChatUser');
            const invoiceData = JSON.parse(localStorage.getItem('lastInvoice'));

            if (targetUser && !conversations[targetUser]) {
                conversations[targetUser] = [{ sender: "staff", text: `Hello ${targetUser}, how can I help you?`, time: "Just now" }];
            }

            renderChatList();

            if (targetUser) {
                switchChat(targetUser);
                localStorage.removeItem('activeChatUser');
            }

            if (invoiceData) {
                activeUser = invoiceData.name;
                if (!conversations[activeUser]) conversations[activeUser] = [];
                
                const invoiceHTML = `
                    <div class="invoice-card">
                        <strong>E-INVOICE CONFIRMED</strong><br>
                        -------------------------<br>
                        Pickup: ${invoiceData.pickup}<br>
                        Dest: ${invoiceData.dest}<br>
                        Time: ${invoiceData.date}<br>
                        Total: £17.00 (UNPAID)
                    </div>`;
                
                conversations[activeUser].push({ sender: "staff", text: invoiceHTML, time: "System" });
                localStorage.removeItem('lastInvoice');
                renderChatList();
                switchChat(activeUser);
            }
        }

        function renderChatList() {
            const container = document.getElementById('chatListContainer');
            container.innerHTML = "";
            for (let user in conversations) {
                const lastMsg = conversations[user][conversations[user].length - 1];
                const isActive = user === activeUser ? "active" : "";
                container.innerHTML += `
                    <div class="chat-item ${isActive}" onclick="switchChat('${user}')">
                        <h4>${user}</h4>
                        <p>${lastMsg ? lastMsg.text : "No messages yet"}</p>
                    </div>`;
            }
        }

        function switchChat(user) {
            activeUser = user;
            document.getElementById('currentChatUser').innerText = user;
            document.getElementById('userStatus').innerText = "● Online";
            
            const display = document.getElementById('chatDisplay');
            display.innerHTML = "";
            
            conversations[user].forEach(m => {
                const typeClass = m.sender === "staff" ? "msg-staff" : "msg-user";
                display.innerHTML += `
                    <div class="msg ${typeClass}">
                        ${m.text}
                        <span class="msg-time">${m.time}</span>
                    </div>`;
            });
            
            renderChatList();
            display.scrollTop = display.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !activeUser) return;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            conversations[activeUser].push({ sender: "staff", text: text, time: time });
            
            switchChat(activeUser);
            input.value = "";
        }

    </script>
</body>
</html>
