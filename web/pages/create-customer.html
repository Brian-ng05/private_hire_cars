<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register New Customer | Private HireCars Staff</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>

        .toast {
            display: none; position: fixed; bottom: 30px; right: 30px;
            background: #000; color: #fff; padding: 15px 25px;
            border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10000; animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .picker-container { position: relative; cursor: pointer; border: 1px solid #ddd; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .picker-container input[type="date"] {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer; z-index: 2;
        }

        .full-width-card {
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header"><h2>PRIVATE HIRECARS</h2></div>
        <nav class="nav-links">
            <a href="../index.html">Dashboard</a>
            <a href="booking.html">New Booking</a>
            <a href="drivers.html">Driver Directory</a>
            <a href="fleet.html">Fleet Management</a>
            <a href="customers.html" class="active">Manage Customers</a>
            <a href="offers.html">Coupon Management</a>
            <a href="queries.html">User Queries</a>
        </nav>
    </aside>

    <main class="main-container">
        <header class="top-bar">
            <div>
                <h1>Register New Customer</h1>
                <p style="color: #888;">Create a secure account for a new client.</p>
            </div>
        </header>

        <section class="card full-width-card">
            <h3 style="margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Account Details</h3>
            <form class="booking-form" id="createCustForm">
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="newName" placeholder="e.g. Robert Pattinson" required>
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <div class="picker-container">
                        <span id="dobLabel" style="color: #666;">Select Birthday</span>
                        <span>📅</span>
                        <input type="date" id="dob" required onchange="document.getElementById('dobLabel').innerText = this.value; document.getElementById('dobLabel').style.color='#000';">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="newEmail" placeholder="customer@example.com" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="newPhone" placeholder="+44 7700 900XXX" required>
                </div>

                <div class="form-group">
                    <label>Set Password</label>
                    <input type="password" id="newPass" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPass" placeholder="••••••••" required>
                </div>

                <div class="full-width" style="text-align: right; margin-top: 40px; border-top: 1px solid #eee; padding-top: 25px;">
                    <button type="button" class="btn-primary" style="background:#666; margin-right: 12px; padding: 12px 30px;" onclick="history.back()">Cancel</button>
                    <button type="submit" class="btn-primary" style="padding: 12px 35px;">Register Customer</button>
                </div>
            </form>
        </section>
    </main>

    <div id="regToast" class="toast">Customer Account Registered!</div>

    <script>
        document.getElementById('createCustForm').onsubmit = function(e) {
            e.preventDefault();
            const pass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;

            if(pass !== confirm) {
                alert("Passwords do not match!");
                return;
            }

            const toast = document.getElementById('regToast');
            toast.style.display = "block";
            
            setTimeout(() => {
                window.location.href = 'customers.html';
            }, 2000);
        };
    </script>
</body>
</html>
