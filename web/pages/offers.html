<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupon Management | Private HireCars Staff</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .coupon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .coupon-card { border: 2px dashed #ccc; padding: 20px; border-radius: 12px; position: relative; background: #fff; transition: 0.3s; }
        .coupon-card:hover { border-color: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .coupon-badge { position: absolute; top: 10px; right: 10px; background: #000; color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .discount-val { font-size: 2rem; font-weight: 800; margin: 10px 0; color: #28a745; }
        .coupon-code { background: #eee; padding: 5px 10px; border-radius: 4px; font-family: monospace; font-weight: bold; }
        
        /* Toast Notification */
        .toast { display: none; position: fixed; bottom: 30px; right: 30px; background: #000; color: #fff; padding: 15px 25px; border-radius: 8px; z-index: 10000; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Deactivated State */
        .deactivated { opacity: 0.4; pointer-events: none; filter: grayscale(1); border-style: dotted; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header"><h2>PRIVATE HIRECARS</h2></div>
        <nav class="nav-links">
            <a href="../index.html">Dashboard</a>
            <a href="booking.html">New Booking</a>
            <a href="drivers.html">Driver Directory</a>
            <a href="fleet.html">Fleet Management</a>
            <a href="customers.html">Manage Customers</a>
            <a href="offers.html" class="active">Coupon Management</a>
            <a href="queries.html">User Queries</a>
        </nav>
    </aside>

    <main class="main-container">
        <header class="top-bar">
            <div>
                <h1>Coupon & Offers Management</h1>
                <p style="color: #888;">Create and monitor promotional codes (US #24).</p>
            </div>
            <button class="btn-primary" onclick="openCreateModal()">+ Create New Coupon</button>
        </header>

        <section class="coupon-grid" id="couponContainer">
            <div id="cp-LOYAL15"></div>
            <div id="cp-FLYHIGH5"></div>
        </section>
    </main>

    <div id="couponModal" class="modal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);">
        <div class="modal-content" style="background:#fff; margin:5% auto; padding:30px; border-radius:12px; width:600px; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
            <h2 id="modalTitle" style="margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px;">Create New Coupon</h2>
            
            <form id="couponForm" class="booking-form">
                <div class="form-group">
                    <label>Coupon Name</label>
                    <input type="text" id="cpName" placeholder="e.g. Christmas Sale" required>
                </div>
                <div class="form-group">
                    <label>Discount Value</label>
                    <input type="text" id="cpValue" placeholder="e.g. 20% or £10" required>
                </div>
                <div class="form-group">
                    <label>Coupon Code</label>
                    <input type="text" id="cpCode" placeholder="XMAS2026" required style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="cpCategory">
                        <option value="Event">Seasonal Event</option>
                        <option value="Loyalty">Loyalty Reward</option>
                        <option value="First-time">First-time User</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Description</label>
                    <textarea id="cpDesc" rows="3" placeholder="Explain the reward conditions..." style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;"></textarea>
                </div>

                <div style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn-primary" style="background:#888;" onclick="closeCouponModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Coupon</button>
                </div>
            </form>
        </div>
    </div>

    <div id="couponToast" class="toast"></div>

    <script>
        let isEditing = false;
        let editTargetCode = "";

        // Mock data khởi tạo
        const initialCoupons = [
            { name: "Welcome Back Offer", value: "15%", code: "LOYAL15", category: "Loyalty", desc: "Applied for customers with more than 10 bookings." },
            { name: "Airport Special", value: "£5.00", code: "FLYHIGH5", category: "Event", desc: "Summer discount for all airport routes." }
        ];

        function init() {
            const container = document.getElementById('couponContainer');
            container.innerHTML = "";
            initialCoupons.forEach(cp => {
                container.innerHTML += renderCouponHTML(cp);
            });
        }

        function renderCouponHTML(data) {
            return `
                <div class="coupon-card" id="cp-${data.code}">
                    <span class="coupon-badge">${data.category.toUpperCase()}</span>
                    <h3>${data.name}</h3>
                    <div class="discount-val">${data.value} OFF</div>
                    <p style="color: #666; font-size: 0.85rem; margin-bottom: 15px; min-height: 40px;">${data.desc}</p>
                    <p>Code: <span class="coupon-code">${data.code}</span></p>
                    <div style="margin-top: 15px; display: flex; gap: 10px;">
                        <button class="btn-primary" style="font-size: 0.7rem; background:#666;" 
                                onclick="editCoupon('${data.code}', '${data.name}', '${data.value}', '${data.category}', '${data.desc.replace(/'/g, "\\'")}')">Edit</button>
                        <button class="btn-primary" style="font-size: 0.7rem; background:#e53e3e;" 
                                onclick="deactivateCoupon('${data.code}')">Deactivate</button>
                    </div>
                </div>`;
        }

        function openCreateModal() {
            isEditing = false;
            document.getElementById('couponForm').reset();
            document.getElementById('modalTitle').innerText = "Create New Coupon";
            document.getElementById('couponModal').style.display = "block";
        }

        function editCoupon(code, name, value, category, desc) {
            isEditing = true;
            editTargetCode = code;
            document.getElementById('modalTitle').innerText = "Edit Coupon: " + code;
            document.getElementById('cpName').value = name;
            document.getElementById('cpValue').value = value;
            document.getElementById('cpCode').value = code;
            document.getElementById('cpCategory').value = category;
            document.getElementById('cpDesc').value = desc;
            document.getElementById('couponModal').style.display = "block";
        }

        function deactivateCoupon(code) {
            if(confirm(`Deactivate coupon [${code}]? This action cannot be undone.`)) {
                document.getElementById(`cp-${code}`).classList.add('deactivated');
                showToast("⚠️ Coupon " + code + " has been deactivated.");
            }
        }

        function closeCouponModal() { document.getElementById('couponModal').style.display = "none"; }

        document.getElementById('couponForm').onsubmit = function(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('cpName').value,
                value: document.getElementById('cpValue').value,
                code: document.getElementById('cpCode').value.toUpperCase(),
                category: document.getElementById('cpCategory').value,
                desc: document.getElementById('cpDesc').value
            };

            if (isEditing) {
                document.getElementById(`cp-${editTargetCode}`).outerHTML = renderCouponHTML(data);
                showToast("✅ Coupon updated successfully!");
            } else {
                document.getElementById('couponContainer').insertAdjacentHTML('afterbegin', renderCouponHTML(data));
                showToast("✅ New coupon published!");
            }
            closeCouponModal();
        };

        function showToast(msg) {
            const t = document.getElementById('couponToast');
            t.innerText = msg; t.style.display = "block";
            setTimeout(() => { t.style.display = "none"; }, 3000);
        }

        init();
    </script>
</body>
</html>
